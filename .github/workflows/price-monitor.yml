name: Price Monitor

on:
  schedule:
    - cron: '*/5 * * * 1-5'   # 平日24時間
  workflow_dispatch:          # 手動実行（テスト用）

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  monitor:
    runs-on: ubuntu-latest
    permissions:
      contents: write         # state.json をコミットするため

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install yfinance

      - name: Run price monitor
        env:
          GMAIL_USER:         ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          NOTIFY_EMAIL:       ${{ secrets.NOTIFY_EMAIL }}
        run: |
          mkdir -p logs
          LOG_FILE="logs/$(date -u +%Y%m%d_%H%M).log"
          python scripts/monitor.py 2>&1 | tee "$LOG_FILE"

      - name: Commit state
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          find logs/ -name "*.log" -mtime +7 -delete 2>/dev/null || true
          git add state/state.json logs/
          git diff --staged --quiet || git commit -m "chore: update monitor state"
          git push
